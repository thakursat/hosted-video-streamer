<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Sign in</title>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #15171c;
    --line: #24272f;
    --text: #e9eaed;
    --muted: #8a8f9a;
    --accent: #f0b429;
    --accent-dim: #b8881f;
    --danger: #e5484d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 40px 32px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--accent);
    display: grid; place-items: center;
    color: #1a1300;
  }
  .mark svg { width: 16px; height: 16px; }
  h1 { font-size: 1.25rem; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 0.85rem; margin: 14px 0 28px; }
  label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.02em; }
  input {
    width: 100%;
    background: #0e0f13;
    border: 1px solid var(--line);
    border-radius: 9px;
    color: var(--text);
    padding: 11px 13px;
    font-size: 0.95rem;
    margin-bottom: 18px;
    transition: border-color .15s;
  }
  input:focus { outline: none; border-color: var(--accent-dim); }
  button {
    width: 100%;
    background: var(--accent);
    color: #1a1300;
    border: none;
    border-radius: 9px;
    padding: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s;
  }
  button:hover { filter: brightness(1.06); }
  .err {
    background: rgba(229,72,77,.12);
    border: 1px solid rgba(229,72,77,.35);
    color: #ff9b9e;
    font-size: 0.82rem;
    padding: 9px 12px;
    border-radius: 8px;
    margin-bottom: 18px;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
      <h1>StreamVault</h1>
    </div>
    <p class="sub" id="sub">Sign in to reach your library.</p>
    <div class="err" id="err"></div>
    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@local">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
    <div id="confirmWrap" style="display:none">
      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" autocomplete="new-password" placeholder="••••••••">
    </div>
    <button id="go">Sign in</button>
  </div>
<script>
  const err = document.getElementById('err');
  const sub = document.getElementById('sub');
  const goBtn = document.getElementById('go');
  const confirmWrap = document.getElementById('confirmWrap');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const confirmEl = document.getElementById('confirm');
  let mode = 'login'; // or 'signup'

  function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }

  async function init() {
    try {
      const r = await fetch('/api/setup-state');
      const d = await r.json();
      if (!d.hasAccount) setSignup();
    } catch {}
  }
  function setSignup() {
    mode = 'signup';
    document.title = 'StreamVault — Create account';
    sub.textContent = 'Welcome — create your account to get started.';
    goBtn.textContent = 'Create account';
    confirmWrap.style.display = '';
    passwordEl.setAttribute('autocomplete', 'new-password');
    passwordEl.placeholder = 'At least 8 characters';
  }

  async function submit() {
    err.style.display = 'none';
    const email = emailEl.value.trim();
    const password = passwordEl.value;
    if (mode === 'signup') {
      if (password.length < 8) return showErr('Password must be at least 8 characters.');
      if (password !== confirmEl.value) return showErr('Passwords do not match.');
      const r = await fetch('/api/signup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (r.ok) { location.href = '/'; return; }
      const d = await r.json().catch(() => ({}));
      showErr(d.error || 'Could not create account.');
      return;
    }
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    if (r.ok) { location.href = '/'; }
    else { const d = await r.json().catch(() => ({})); showErr(d.error || 'Sign in failed.'); }
  }

  goBtn.addEventListener('click', submit);
  document.querySelectorAll('input').forEach(i =>
    i.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); }));
  init();
</script>
</body>
</html>
